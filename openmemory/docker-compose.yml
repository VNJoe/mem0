services:
  mem0_store:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - mem0_storage:/mem0/storage
    networks:
      - proxynet  # Assign this service to the proxynet network
  openmemory-mcp:
    image: mem0/openmemory-mcp
    build: api/
    environment:
      - USER
    env_file:
      - api/.env
    depends_on:
      - mem0_store
    ports:
      - "8765:8765"
    volumes:
      - ./api:/usr/src/openmemory
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --reload --workers 4"
    networks:
      - proxynet  # Assign this service to the proxynet network
  openmemory-ui:
    build:
      context: ui/
      dockerfile: Dockerfile
    image: mem0/openmemory-ui:latest
    ports:
      - "3300:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_USER_ID=${USER}
    networks:
      - proxynet  # Assign this service to the proxynet network

volumes:
  mem0_storage:

networks:
  proxynet:
    external: true # This tells Docker Compose that 'proxynet' already exists
